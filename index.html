<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>The Listings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow: #FFC630;
    --bg: #121212;
    --panel: #1c1c1c;
    --card-bottom: #2e2e2e;
    --ink: #161616;
    --text-soft: #d8d8d8;
    --text-dim: #939393;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    height:100%;
    background: var(--bg);
    color: var(--text-soft);
    font-family:'Inter', sans-serif;
    overscroll-behavior:none;
  }

  #app{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
  }

  /* ---------- HOME (grid) ---------- */
  #home{
    flex:1;
    overflow-y:auto;
    padding: 28px 18px 100px;
    -webkit-overflow-scrolling:touch;
  }

  .masthead{ text-align:center; margin-bottom:28px; }
  .masthead h1{
    font-family:'Baloo 2'; font-weight:800; font-size:26px;
    color:#fff; margin:0; letter-spacing:.5px;
  }
  .masthead p{ margin:6px 0 0; font-size:12.5px; color:var(--text-dim); }

  .category{ margin: 0 0 44px; }

  .category-tab{
    display:inline-flex; align-items:center; gap:8px;
    background: var(--yellow); color:var(--ink);
    font-family:'Baloo 2'; font-weight:700; font-size:16px;
    padding:6px 22px; border-radius:8px;
    margin:0 0 -16px 24px;
    box-shadow:0 4px 0 rgba(0,0,0,.25);
    position:relative; z-index:2;
  }

  .panel{
    border:2.5px solid var(--yellow); border-radius:26px;
    padding:26px 14px 16px;
    background: linear-gradient(180deg, rgba(255,198,48,.05), rgba(255,198,48,0) 30%);
  }

  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px 10px; }

  .card{
    background:#fff; border:none; border-radius:14px; overflow:hidden;
    display:flex; flex-direction:column; cursor:pointer; padding:0;
    transform:scale(1);
    transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
    -webkit-user-select:none; user-select:none;
  }
  .card.is-pressed{ transform:scale(1.08); box-shadow:0 10px 22px rgba(0,0,0,.4); z-index:3; }

  .card-icon{ 
    flex:1; display:flex; align-items:center; justify-content:center; 
    padding:0; height: 70px; background: #e0e0e0; width: 100%;
  }
  .card-icon img{ width: 100%; height: 100%; object-fit: cover; }
  .card-icon .fallback-letter{
    width: 100%; height: 100%; display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2'; font-weight:700; font-size:24px; color:#fff;
  }

  .card-label{
    background:var(--card-bottom); color:var(--text-soft); font-size:11px; font-weight:600;
    text-align:center; padding:8px 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* ---------- WEBVIEW ---------- */
  #webviewScreen{
    position:fixed; inset:0; display:flex; flex-direction:column;
    background:#000; transform:translateX(100%);
    transition: transform .28s cubic-bezier(.32,.72,.35,1);
    z-index:20;
  }
  #webviewScreen.open{ transform:translateX(0); }

  .webview-topbar{
    display:flex; align-items:center; justify-content: space-between;
    padding: 10px 12px; background:#161616;
    border-bottom:1px solid #262626;
    flex-shrink:0;
  }
  .wv-topbar-left {
    display: flex; gap: 8px;
  }
  .wv-btn{
    width:34px; height:34px; border-radius:10px; border:none;
    background:#262626; color:#fff; font-size:18px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    flex-shrink:0; transition: transform .1s;
  }
  .wv-btn:active{ transform:scale(.92); }
  .wv-btn.highlight { color: var(--yellow); }

  .wv-body{ flex:1; position:relative; background:#0e0e0e; }
  .wv-body iframe{ width:100%; height:100%; border:none; background:#fff; }

  .wv-loading{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; background:#0e0e0e; transition:opacity .25s ease;
  }
  .wv-spinner{
    width:34px; height:34px; border-radius:50%;
    border:3px solid #333; border-top-color:var(--yellow);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .wv-loading span{ font-size:12.5px; color:var(--text-dim); }

  .wv-blocked{
    position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px 28px; background:#0e0e0e; gap:14px;
  }
  .wv-blocked.show{ display:flex; }
  .wv-blocked-icon{
    width:56px; height:56px; border-radius:16px; background:#fff;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .wv-blocked-icon img{ width:100%; height:100%; object-fit:cover; }
  .wv-blocked h3{ font-family:'Baloo 2'; font-size:17px; color:#fff; margin:0; }
  .wv-blocked p{ font-size:13px; color:var(--text-dim); margin:0; line-height:1.5; max-width:280px; }
  .wv-blocked button{
    margin-top:6px; border:none; border-radius:14px; padding:12px 26px;
    background:var(--yellow); color:var(--ink); font-family:'Inter'; font-weight:700; font-size:14px;
    cursor:pointer;
  }
  .wv-blocked button:active{ transform:scale(.96); }

  /* ---------- FAB (Floating Action Button) DI KIRI TENGAH ---------- */
  .fab-menu {
    position: fixed; left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--yellow); color: var(--ink);
    border: none; box-shadow: 0 4px 12px rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 30; transition: transform .2s;
  }
  .fab-menu:active { transform: translateY(-50%) scale(0.85); }
  .fab-menu svg { width: 22px; height: 22px; }

  /* ---------- SIDE MENU (Sidebar) ---------- */
  #sideBackdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    opacity: 0; pointer-events: none; transition: opacity .3s ease;
    z-index: 35; backdrop-filter: blur(2px);
  }
  #sideBackdrop.open { opacity: 1; pointer-events: auto; }

  #sideMenu {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 280px; max-width: 80%; background: #1a1a1a;
    border-right: 2px solid #2a2a2a;
    transform: translateX(-100%); transition: transform .3s cubic-bezier(.32,.72,.35,1);
    z-index: 36; display: flex; flex-direction: column;
  }
  #sideMenu.open { transform: translateX(0); }

  .side-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 16px 14px; border-bottom: 1px solid #2a2a2a;
  }
  .side-header h2 {
    margin: 0; font-family: 'Baloo 2'; font-size: 20px; color: var(--yellow);
  }
  .side-close {
    background: none; border: none; color: #fff; font-size: 20px;
    cursor: pointer; padding: 4px; border-radius: 8px;
  }

  .side-content { flex: 1; overflow-y: auto; padding: 12px 12px 24px; }
  .side-content::-webkit-scrollbar { width: 6px; }
  .side-content::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

  .side-item-btn {
    display: flex; align-items: center; gap: 12px; width: 100%;
    background: none; border: none; text-align: left;
    padding: 12px; border-radius: 12px; cursor: pointer;
    color: #fff; font-family: 'Inter'; font-weight: 600; font-size: 15px;
    transition: background .15s ease; margin-bottom: 6px;
  }
  .side-item-btn:active { background: rgba(255,198,48,.1); }
  .side-item-btn.cat-btn { background: #242424; border: 1px solid #333; }
  
  .side-item-icon {
    width: 32px; height: 32px; border-radius: 8px; background: #fff; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .side-item-icon img { width: 100%; height: 100%; object-fit: cover; }
  .side-item-icon .fallback-letter {
    font-family: 'Baloo 2'; font-weight: 700; font-size: 14px; color: #fff;
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  }

  .side-back-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    background: transparent; border: 1px solid var(--yellow); color: var(--yellow);
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    font-family: 'Inter'; font-weight: 700; font-size: 14px;
    margin-bottom: 16px;
  }
  .side-back-btn:active { background: rgba(255,198,48,.1); }

  /* ---------- CONFIRM MODAL ---------- */
  #confirmBackdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.55);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .22s ease;
    z-index:40;
  }
  #confirmBackdrop.open{ opacity:1; pointer-events:auto; }
  #confirmSheet{
    width:100%; max-width:480px; background:#1e1e1e;
    border:1.5px solid rgba(255,198,48,.35); border-bottom:none;
    border-radius:24px 24px 0 0; padding:24px 22px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,.35,1);
  }
  #confirmBackdrop.open #confirmSheet{ transform:translateY(0); }
  .confirm-handle{ width:40px; height:4px; background:#444; border-radius:999px; margin:0 auto 16px; }
  .confirm-head{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .confirm-icon{ width:44px; height:44px; border-radius:12px; background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden;}
  .confirm-icon img{ width:100%; height:100%; object-fit:cover; }
  .confirm-title{ font-family:'Baloo 2'; font-weight:700; font-size:17px; color:#fff; margin:0; }
  .confirm-sub{ font-size:12px; color:var(--text-dim); margin:2px 0 0; word-break:break-all; }
  
  .confirm-actions{ display:flex; gap:10px; margin-top: 24px;}
  .confirm-btn{
    flex:1; border:none; border-radius:14px; padding:14px 10px;
    font-family:'Inter'; font-weight:700; font-size:14.5px; cursor:pointer;
    transition: transform .12s ease;
  }
  .confirm-btn:active{ transform:scale(.96); }
  .confirm-btn.cancel{ background:#2c2c2c; color:var(--text-soft); }
  .confirm-btn.go{ background:var(--yellow); color:var(--ink); }
</style>
</head>
<body>

<div id="app">

  <div id="home">
    <div class="masthead">
      <h1>THE LISTINGS</h1>
      <p>Ketuk kartu untuk buka di dalam app</p>
    </div>
    <div id="categories"></div>
  </div>

  <div id="webviewScreen">
    <div class="webview-topbar">
      <!-- Kumpulan tombol fungsi di kiri -->
      <div class="wv-topbar-left">
        <button class="wv-btn" id="wvBack" title="Tutup">‹</button>
        <button class="wv-btn" id="wvHome" title="Ke Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </button>
      </div>
      
      <!-- Nama dan URL udah dipenggal, langsung tombol browser di kanan -->
      <button class="wv-btn highlight" id="wvOpenBrowser" title="Buka di browser">↗</button>
    </div>
    
    <div class="wv-body">
      <iframe id="wvIframe" src="about:blank" allow="autoplay; encrypted-media" referrerpolicy="no-referrer"
        sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock"></iframe>
      <div class="wv-loading" id="wvLoading">
        <div class="wv-spinner"></div>
        <span>Memuat situs…</span>
      </div>
      <div class="wv-blocked" id="wvBlocked">
        <div class="wv-blocked-icon" id="wvBlockedIcon"></div>
        <h3 id="wvBlockedTitle">Situs ini tidak bisa ditampilkan di dalam app</h3>
        <p>Situs ini mengunci diri dari iframe (keamanan server). Buka di browser aslinya buat lanjut cuy.</p>
        <button id="wvBlockedOpen">Buka di browser</button>
      </div>
    </div>
  </div>

  <!-- FAB Di Kiri Tengah Layar -->
  <button id="fabBtn" class="fab-menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>

</div>

<!-- Backdrop & Side Menu Sidebar -->
<div id="sideBackdrop"></div>
<div id="sideMenu">
  <div class="side-header">
    <h2 id="sideTitle">Menu</h2>
    <button id="sideClose" class="side-close">✕</button>
  </div>
  <div class="side-content" id="sideContent">
    <!-- Konten diisi via JS -->
  </div>
</div>

<div id="confirmBackdrop">
  <div id="confirmSheet">
    <div class="confirm-handle"></div>
    <div class="confirm-head">
      <div class="confirm-icon" id="confirmIcon"></div>
      <div>
        <p class="confirm-title" id="confirmTitle">Site name</p>
        <p class="confirm-sub" id="confirmUrl">https://example.com</p>
      </div>
    </div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" id="confirmCancel">Batal</button>
      <button class="confirm-btn go" id="confirmGo">Buka Link</button>
    </div>
  </div>
</div>

<script>
// DAFTAR LINK UPDATE-AN BARU
const LISTING_DATA = [
  { key:"daily", label:"Daily", items:[
    { title:"TikTok", url:"https://www.tiktok.com/id-ID/", domain:"www.tiktok.com", fallbackColor:"#000000" },
    { title:"Instagram", url:"https://www.instagram.com/", domain:"www.instagram.com", fallbackColor:"#C1327A" },
    { title:"X", url:"https://x.com/", domain:"x.com", fallbackColor:"#000000" },
    { title:"Facebook", url:"https://www.facebook.com/", domain:"facebook.com", fallbackColor:"#1877F2" },
    { title:"Threads", url:"https://www.threads.net/", domain:"threads.net", fallbackColor:"#000000" },
    // TAMBAHAN WHATSAPP (Dibikin isApp: true biar buka ke Native App)
    { title:"WhatsApp", url:"whatsapp://send", domain:"whatsapp.com", fallbackColor:"#25D366", isApp: true },
    { title:"RCTI+", url:"https://www.rctiplus.com/", domain:"www.rctiplus.com", fallbackColor:"#FF0000" },
    { title:"Vidio", url:"https://www.vidio.com/", domain:"www.vidio.com", fallbackColor:"#E50914" },
    { title:"Google Search", url:"https://www.google.com/", domain:"www.google.com", fallbackColor:"#4285F4" },
    { title:"GitHub", url:"https://github.com/", domain:"github.com", fallbackColor:"#24292e" },
    // TAMBAHAN SPOTIFY & YOUTUBE (Dibikin isApp: true biar buka ke Native App)
    { title:"YouTube", url:"vnd.youtube://", domain:"youtube.com", fallbackColor:"#FF0000", isApp: true },
    { title:"Spotify", url:"spotify://", domain:"spotify.com", fallbackColor:"#1DB954", isApp: true }
  ]},
  { key:"17", label:"17", items:[
    { title:"Manhwaweb", url:"https://manhwaweb.com/", domain:"manhwaweb.com", fallbackColor:"#6C4AB6" },
    { title:"Mangapoi", url:"https://v2.mangapoi.one/", domain:"v2.mangapoi.one", fallbackColor:"#2E8B57" },
    { title:"Manhwadesu", url:"https://manhwadesu.im/", domain:"manhwadesu.im", fallbackColor:"#C0392B" },
    { title:"Omega Scans", url:"https://omegascans.org/", domain:"omegascans.org", fallbackColor:"#1F1F1F" },
    { title:"Raja Hentai", url:"http://rajahentai.com/", domain:"rajahentai.com", fallbackColor:"#24292e" },
    { title:"JAV porn Pics", url:"https://javpornpics.com/", domain:"javpornpics.com", fallbackColor:"#24292e" },
    { title:"Fapello", url:"https://fapello.com/", domain:"fapello.com", fallbackColor:"#24292e" },
    { title:"GitHub 1", url:"https://github 1.com/", domain:"github 1.com", fallbackColor:"#24292e" },
    { title:"GitHub 2", url:"https://github 2.com/", domain:"github 2.com", fallbackColor:"#24292e" }
  ]},
  { key:"sport", label:"Sport", items:[
    { title:"UEFA", url:"https://www.uefa.com/", domain:"www.uefa.com", fallbackColor:"#004C99" },
    { title:"FIFA", url:"https://www.fifa.com/", domain:"www.fifa.com", fallbackColor:"#0A2A6B" },
    { title:"LaLiga", url:"https://www.laliga.com/en-GB/laliga-easports/standing", domain:"www.laliga.com", fallbackColor:"#EE2624" },
    { title:"Transfermarkt", url:"https://www.transfermarkt.co.id/", domain:"www.transfermarkt.co.id", fallbackColor:"#1A7A3C" },
    { title:"EPL", url:"https://www.premierleague.com/", domain:"www.premierleague.com", fallbackColor:"#3D0E5C" },
    { title:"Yalla Kora", url:"https://www.yallakora.com/matches-center", domain:"www.yallakora.com", fallbackColor:"#000000" },
    { title:"Yalla Shoot", url:"https://yallashoot.space/", domain:"yallashoot.space", fallbackColor:"#000000" }
  ]}
];

(function(){
  const categoriesRoot = document.getElementById("categories");
  const home = document.getElementById("home");

  // Komponen Sidebar Menu
  const fabBtn = document.getElementById("fabBtn");
  const sideBackdrop = document.getElementById("sideBackdrop");
  const sideMenu = document.getElementById("sideMenu");
  const sideTitle = document.getElementById("sideTitle");
  const sideContent = document.getElementById("sideContent");
  const sideClose = document.getElementById("sideClose");

  // Komponen Pop Up Confirm
  const confirmBackdrop = document.getElementById("confirmBackdrop");
  const confirmIcon = document.getElementById("confirmIcon");
  const confirmTitle = document.getElementById("confirmTitle");
  const confirmUrl = document.getElementById("confirmUrl");
  const confirmCancel = document.getElementById("confirmCancel");
  const confirmGo = document.getElementById("confirmGo");

  // Komponen Webview 
  const webviewScreen = document.getElementById("webviewScreen");
  const wvBack = document.getElementById("wvBack");
  const wvHome = document.getElementById("wvHome");
  const wvOpenBrowser = document.getElementById("wvOpenBrowser");
  const wvIframe = document.getElementById("wvIframe");
  const wvLoading = document.getElementById("wvLoading");
  const wvBlocked = document.getElementById("wvBlocked");
  const wvBlockedIcon = document.getElementById("wvBlockedIcon");
  const wvBlockedTitle = document.getElementById("wvBlockedTitle");
  const wvBlockedOpen = document.getElementById("wvBlockedOpen");

  let currentItem = null;
  let loadTimer = null;

  function faviconUrl(domain){
    return `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
  }

  function iconEl(item){
    const wrap = document.createElement("div");
    wrap.style.width = "100%";
    wrap.style.height = "100%";
    const img = document.createElement("img");
    img.src = faviconUrl(item.domain);
    img.alt = "";
    img.loading = "lazy";
    img.onerror = () => {
      wrap.innerHTML = "";
      const fb = document.createElement("div");
      fb.className = "fallback-letter";
      fb.style.background = item.fallbackColor || "#555";
      fb.textContent = item.title.charAt(0);
      wrap.appendChild(fb);
    };
    wrap.appendChild(img);
    return wrap;
  }

  function buildCard(item){
    const card = document.createElement("button");
    card.type = "button";
    card.className = "card";

    const iconWrap = document.createElement("div");
    iconWrap.className = "card-icon";
    iconWrap.appendChild(iconEl(item));
    card.appendChild(iconWrap);

    const label = document.createElement("div");
    label.className = "card-label";
    label.textContent = item.title;
    card.appendChild(label);

    const press = () => card.classList.add("is-pressed");
    const release = () => card.classList.remove("is-pressed");
    card.addEventListener("pointerdown", press);
    card.addEventListener("pointerup", release);
    card.addEventListener("pointerleave", release);
    card.addEventListener("click", () => requestOpen(item));

    return card;
  }

  function buildCategory(section){
    const wrap = document.createElement("div");
    wrap.className = "category";
    wrap.id = "cat-" + section.key;

    const tab = document.createElement("div");
    tab.className = "category-tab";
    tab.textContent = section.label;

    const panel = document.createElement("div");
    panel.className = "panel";
    const grid = document.createElement("div");
    grid.className = "grid";
    section.items.forEach(item => grid.appendChild(buildCard(item)));
    panel.appendChild(grid);

    wrap.appendChild(tab);
    wrap.appendChild(panel);
    return wrap;
  }

  function renderHome(){
    LISTING_DATA.forEach(section => categoriesRoot.appendChild(buildCategory(section)));
  }

  // --- LOGIKA SIDE MENU ---
  function openSideMenu() {
    sideBackdrop.classList.add("open");
    sideMenu.classList.add("open");
    renderSideCategories();
  }

  function closeSideMenu() {
    sideBackdrop.classList.remove("open");
    sideMenu.classList.remove("open");
  }

  function renderSideCategories() {
    sideTitle.textContent = "Menu Kategori";
    sideContent.innerHTML = "";
    
    LISTING_DATA.forEach(section => {
      const btn = document.createElement("button");
      btn.className = "side-item-btn cat-btn";
      
      const iconWrap = document.createElement("div");
      iconWrap.className = "side-item-icon";
      iconWrap.innerHTML = `<div class="fallback-letter" style="background:#444;">${section.label.charAt(0)}</div>`;
      
      const labelSpan = document.createElement("span");
      labelSpan.textContent = section.label;
      
      btn.appendChild(iconWrap);
      btn.appendChild(labelSpan);
      
      btn.addEventListener("click", () => renderSideItems(section));
      sideContent.appendChild(btn);
    });
  }

  function renderSideItems(section) {
    sideTitle.textContent = section.label;
    sideContent.innerHTML = "";

    const backBtn = document.createElement("button");
    backBtn.className = "side-back-btn";
    backBtn.innerHTML = `‹ Kembali ke Kategori`;
    backBtn.addEventListener("click", renderSideCategories);
    sideContent.appendChild(backBtn);

    section.items.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "side-item-btn";

      const iconWrap = document.createElement("div");
      iconWrap.className = "side-item-icon";
      iconWrap.appendChild(iconEl(item));

      const labelSpan = document.createElement("span");
      labelSpan.textContent = item.title;

      btn.appendChild(iconWrap);
      btn.appendChild(labelSpan);

      btn.addEventListener("click", () => {
        closeSideMenu();
        requestOpen(item);
      });
      sideContent.appendChild(btn);
    });
  }

  fabBtn.addEventListener("click", openSideMenu);
  sideClose.addEventListener("click", closeSideMenu);
  sideBackdrop.addEventListener("click", closeSideMenu);

  // --- LOGIKA BUKA WEBVIEW ATAU NATIVE APP ---
  let pendingItem = null;

  function requestOpen(item){
    pendingItem = item;
    confirmTitle.textContent = item.title;
    
    // Ganti deskripsi URL sama tulisan di tombol kalau dia ini Native App
    if(item.isApp) {
      confirmUrl.textContent = "Buka di Aplikasi Bawaan HP";
      confirmGo.textContent = "Buka Aplikasi";
    } else {
      confirmUrl.textContent = item.url;
      confirmGo.textContent = "Buka Link";
    }
    
    confirmIcon.innerHTML = "";
    confirmIcon.appendChild(iconEl(item));
    confirmBackdrop.classList.add("open");
  }

  function closeConfirm(){
    confirmBackdrop.classList.remove("open");
    pendingItem = null;
  }

  confirmCancel.addEventListener("click", closeConfirm);
  confirmBackdrop.addEventListener("click", (e) => {
    if (e.target === confirmBackdrop) closeConfirm();
  });
  
  confirmGo.addEventListener("click", () => {
    if (pendingItem){
      const item = pendingItem;
      closeConfirm();
      
      // LOGIKA BUAT NGELEMPEAR KE APLIKASINYA 
      if(item.isApp) {
        window.location.href = item.url;
      } else {
        openWebview(item); 
      }
    }
  });

  function openWebview(item){
    currentItem = item;
    
    wvBlocked.classList.remove("show");
    wvLoading.style.opacity = "1";
    wvLoading.style.display = "flex";
    wvIframe.style.visibility = "hidden";

    wvIframe.src = item.url;
    webviewScreen.classList.add("open");

    clearTimeout(loadTimer);
    loadTimer = setTimeout(() => showBlocked(item), 3500);
  }

  wvIframe.addEventListener("load", () => {
    if (wvIframe.src === "about:blank") return;
    clearTimeout(loadTimer);
    wvLoading.style.opacity = "0";
    setTimeout(() => { wvLoading.style.display = "none"; }, 250);
    wvIframe.style.visibility = "visible";
  });

  function showBlocked(item){
    wvLoading.style.display = "none";
    wvIframe.style.visibility = "hidden";
    wvBlockedTitle.textContent = `${item.title} nggak mau dibuka di sini`;
    wvBlockedIcon.innerHTML = "";
    wvBlockedIcon.appendChild(iconEl(item));
    wvBlocked.classList.add("show");
  }

  function closeWebview(){
    webviewScreen.classList.remove("open");
    clearTimeout(loadTimer);
    setTimeout(() => { wvIframe.src = "about:blank"; }, 300);
  }

  wvBack.addEventListener("click", closeWebview);

  wvHome.addEventListener("click", () => {
    window.location.href = "index.html"; 
  });

  wvOpenBrowser.addEventListener("click", () => {
    if (currentItem) window.open(currentItem.url, "_blank", "noopener");
  });
  wvBlockedOpen.addEventListener("click", () => {
    if (currentItem) window.open(currentItem.url, "_blank", "noopener");
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape"){
      closeConfirm();
      closeSideMenu();
      if (webviewScreen.classList.contains("open")) closeWebview();
    }
  });

  renderHome();
})();
</script>
</body>
</html>
